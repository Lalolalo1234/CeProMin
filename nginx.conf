server {
  listen 8080;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Serve the SPA entrypoint for unknown routes.
  location / {
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(css|js)$ {
    add_header Cache-Control "public, max-age=3600";
  }

  location = /health {
    return 200 "ok\n";
    add_header Content-Type text/plain;
  }
}
